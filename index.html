<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --asphalt:#15171A; --panel:#1E2126; --panel2:#262A30; --border:#31363D;
    --text:#E9E7E1; --muted:#888D95; --amber:#FFB000; --amber-dim:#9C6E00;
    --red:#E8412E; --green:#46B07A;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --disp:"Helvetica Neue",Arial,system-ui,sans-serif;
    --body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--asphalt);color:var(--text);font-family:var(--body);
    -webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:780px;margin:0 auto;padding:18px 14px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .brand{font-family:var(--disp);font-weight:800;letter-spacing:.14em;text-transform:uppercase;
    font-size:18px;display:flex;align-items:center;gap:9px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px var(--amber)}
  .brand small{display:block;font-size:9px;letter-spacing:.22em;color:var(--muted);font-weight:600;margin-top:1px}
  .who{display:flex;align-items:center;gap:6px;font-size:12px}
  .who label{color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:10px}
  select,input,button{font-family:inherit;color:var(--text)}
  select.user{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;font-weight:600}
  .ctx{font-size:11.5px;color:var(--muted);margin:0 2px 14px;padding:8px 11px;background:var(--panel);
    border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:8px}
  .ctx b{color:var(--text)}
  /* gauge hero */
  .hero{background:linear-gradient(180deg,var(--panel) 0%,#191C20 100%);border:1px solid var(--border);
    border-radius:16px;padding:16px 16px 12px;display:flex;gap:16px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .gauge{flex:0 0 168px;position:relative;width:168px;height:104px}
  .gauge svg{display:block;overflow:visible}
  .gauge .pct{position:absolute;left:0;right:0;bottom:6px;text-align:center;font-family:var(--mono);font-size:30px;font-weight:700;letter-spacing:-.02em}
  .gauge .glabel{position:absolute;left:0;right:0;bottom:-12px;text-align:center;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .herostats{flex:1;min-width:200px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .stat{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
  .stat b{font-family:var(--mono);font-size:21px;font-weight:700;display:block;line-height:1}
  .stat span{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stat.red b{color:var(--red)} .stat.green b{color:var(--green)} .stat.amber b{color:var(--amber)}
  .days{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
  .day{flex:0 0 auto;background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:8px 13px;cursor:pointer;
    font-family:var(--disp);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:13px;color:var(--muted);position:relative}
  .day .cnt{font-family:var(--mono);font-size:10px;font-weight:600;margin-left:5px;color:var(--muted)}
  .day.active{color:var(--asphalt);background:var(--amber);border-color:var(--amber)}
  .day.active .cnt{color:#3a2a00}
  .day .warn{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%;background:var(--red)}
  .day.today::after{content:"●";position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-size:6px;color:var(--green)}
  .urgent{border:1px solid var(--red);border-radius:11px;background:rgba(232,65,46,.08);padding:10px 12px;margin-bottom:12px}
  .urgent h3{margin:0 0 6px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:6px}
  .urgent ul{margin:0;padding-left:18px;font-size:13px}
  .listhdr{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 8px}
  .listhdr h2{font-family:var(--disp);font-weight:800;letter-spacing:.1em;text-transform:uppercase;font-size:15px;margin:0}
  .listhdr .sub{font-size:11px;color:var(--muted)}
  .row{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:10px 11px;display:flex;align-items:center;gap:11px;margin-bottom:8px;transition:border-color .15s,background .15s}
  .row.done{opacity:.62;background:#191C20}
  .row.carried{border-color:var(--red)}
  .check{flex:0 0 26px;width:26px;height:26px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .row.done .check{background:var(--green);border-color:var(--green)}
  .check svg{opacity:0} .row.done .check svg{opacity:1}
  .rowmain{flex:1;min-width:0}
  .rowname{font-size:14px;font-weight:600;line-height:1.25}
  .row.done .rowname{text-decoration:line-through;text-decoration-color:var(--muted)}
  .rowmeta{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;padding:1px 6px;border-radius:5px;text-transform:uppercase}
  .badge.carry{background:rgba(232,65,46,.16);color:var(--red)}
  .badge.who{background:var(--panel2);color:var(--muted)}
  .badge.tag{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .badge.tag.one{border-color:var(--amber-dim);color:var(--amber)}
  .count{flex:0 0 auto;display:flex;align-items:center;gap:5px}
  .count input{width:46px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:6px 4px;text-align:center;font-family:var(--mono);font-size:14px;font-weight:600}
  .count .tgt{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .iconbtn{flex:0 0 auto;width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--panel2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .iconbtn:hover{color:var(--text)}
  .iconbtn.flag.on{color:var(--red);border-color:var(--red)}
  .addform{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .addform input.name{flex:1;min-width:160px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:10px 11px;font-size:14px}
  .addform input.tgt{width:84px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:10px 8px;font-size:14px;text-align:center;font-family:var(--mono)}
  .btn{border:none;border-radius:9px;padding:10px 15px;font-weight:700;cursor:pointer;font-size:13px;letter-spacing:.03em}
  .btn.amber{background:var(--amber);color:#241900}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:center}
  .actions .note{font-size:11px;color:var(--muted);flex:1;min-width:140px}
  .empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:13px;border:1px dashed var(--border);border-radius:11px}
  .tally{margin-top:18px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 14px}
  .tally h3{margin:0 0 9px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .tally .grid{display:flex;gap:8px;flex-wrap:wrap}
  .crew{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-size:12px}
  .crew b{font-family:var(--mono);color:var(--amber)}
  details.log{margin-top:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:0 14px}
  details.log summary{cursor:pointer;list-style:none;padding:13px 0;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  details.log summary::-webkit-details-marker{display:none}
  details.log summary .chev{transition:transform .2s}
  details.log[open] summary .chev{transform:rotate(90deg)}
  .logrow{display:flex;gap:9px;align-items:baseline;padding:7px 0;border-top:1px solid var(--border);font-size:12.5px}
  .logrow .t{font-family:var(--mono);font-size:10.5px;color:var(--muted);flex:0 0 92px}
  .logrow .nm{flex:1}
  .logrow .by{font-family:var(--mono);font-size:10.5px;color:var(--amber)}
  .logrow .ct{font-family:var(--mono);font-size:11px;color:var(--green)}
  .logempty{padding:0 0 13px;color:var(--muted);font-size:12px}
  input:focus-visible,button:focus-visible,select:focus-visible,summary:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  @media (max-width:480px){.gauge{flex-basis:148px;width:148px}}
</style>

<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>
      <div>MOTORBURGER<small>ONGOING PREP &middot; DSC DETROIT</small></div>
    </div>
    <div class="who">
      <label for="userSel">Signed in</label>
      <select class="user" id="userSel"></select>
    </div>
  </div>
  <div class="ctx" id="ctx"></div>

  <div class="hero">
    <div class="gauge">
      <svg width="168" height="104" viewBox="0 0 168 104">
        <path d="M14 96 A70 70 0 0 1 154 96" fill="none" stroke="#2A2E34" stroke-width="13" stroke-linecap="round"/>
        <path id="gaugeFill" d="" fill="none" stroke="var(--amber)" stroke-width="13" stroke-linecap="round"/>
        <line id="needle" x1="84" y1="96" x2="84" y2="34" stroke="var(--text)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="84" cy="96" r="6" fill="var(--text)"/>
      </svg>
      <div class="pct" id="gaugePct">0%</div>
      <div class="glabel">Service ready</div>
    </div>
    <div class="herostats">
      <div class="stat green"><b id="sDone">0</b><span>Done</span></div>
      <div class="stat amber"><b id="sOpen">0</b><span>Open</span></div>
      <div class="stat red"><b id="sCarry">0</b><span>Carried</span></div>
      <div class="stat"><b id="sTotal">0</b><span>Items</span></div>
    </div>
  </div>

  <div class="days" id="days"></div>

  <div class="urgent" id="urgent" style="display:none">
    <h3>&#128308; 911 &middot; Restock now</h3>
    <ul id="urgentList"></ul>
  </div>

  <div class="listhdr">
    <h2 id="dayTitle">Prep</h2>
    <div class="sub" id="daySub"></div>
  </div>

  <div id="list"></div>

  <div class="addform">
    <input class="name" id="addName" placeholder="Add a one-off task (e.g. Deep-clean fryer)" />
    <input class="tgt" id="addTgt" type="number" min="0" placeholder="Target" />
    <button class="btn amber" id="addBtn">Add</button>
  </div>

  <div class="actions">
    <button class="btn ghost" id="closeBtn">End service &amp; close out</button>
    <span class="note" id="closeNote"></span>
  </div>

  <div class="tally">
    <h3>Owner roll-up &middot; who's prepping</h3>
    <div class="grid" id="crew"></div>
  </div>

  <details class="log">
    <summary><span>Duty log &middot; completed (last 7 days)</span><span class="chev">&#9656;</span></summary>
    <div id="logBody"></div>
  </details>
</div>

<script>
const STAFF=["Brian","Mitch","Tory","Brandy"];
const OWNER="Jay";
const DAYS=["Tue","Wed","Thu","Fri","Sat","Sun"]; // closed Monday
const NEXT={Tue:"Wed",Wed:"Thu",Thu:"Fri",Fri:"Sat",Sat:"Sun",Sun:"Tue"};
const FULL={Tue:"Tuesday",Wed:"Wednesday",Thu:"Thursday",Fri:"Friday",Sat:"Saturday",Sun:"Sunday"};
const KEY="motorburger:prep:v3";
const WEEK_MS=7*24*60*60*1000;

const FACTOR={Tue:1,Wed:1.1,Thu:1.6,Fri:3.3,Sat:6.5,Sun:4.6};
function seedDay(day){
  const f=FACTOR[day];
  const base=[
    ["Beef patties — Classic / Deux / Hawaiian / Go-Kart / FUNGuY",12],
    ["Chicken portions — Firebird",4],
    ["Lamb portions — Lamborghini",3],
    ["Veggie patties — Veg Engine",3],
    ["Buns stocked & checked",0],
    ["Motor aioli + sauces made",0],
    ["Onions diced",0],
    ["Lettuce & tomato prepped",0],
    ["Fries par-cooked",0],
    ["Pickles & toppings refilled",0],
  ];
  return base.map(([name,t],i)=>({
    id:day+"-s"+i+"-"+rnd(),name,target:t?Math.round(t*f):0,count:0,done:false,
    addedBy:"Standing list",doneBy:null,carriedDays:0,flag:false,recurring:true
  }));
}
function rnd(){return Math.random().toString(36).slice(2,7);}
function isoDate(d){return (d||new Date()).toISOString().slice(0,10);}
function weekdayOfIso(iso){return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(iso+"T12:00:00").getDay()];}
function todayWeekday(){const d=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];return DAYS.includes(d)?d:"Tue";}

let state=null;
let user={role:"staff",name:"Brian"};
let activeDay=todayWeekday();
let flashMsg="";

async function load(){
  try{const r=await window.storage.get(KEY,true); if(r&&r.value) state=JSON.parse(r.value);}catch(e){}
  if(!state||!state.days){
    state={days:{},history:[],serviceDate:isoDate()};
    DAYS.forEach(d=>state.days[d]=seedDay(d));
  }
  if(!state.history) state.history=[];

  // --- auto close-out on date change: the prior service day rolls itself ---
  const today=isoDate();
  if(state.serviceDate && state.serviceDate!==today){
    const prev=weekdayOfIso(state.serviceDate);
    if(DAYS.includes(prev)){ closeOut(prev,true); }
    flashMsg="Auto-closed "+FULL[prev]+" on date change — open one-offs carried forward.";
  }
  state.serviceDate=today;

  // --- purge duty log older than 7 days ---
  const cut=Date.now()-WEEK_MS;
  state.history=state.history.filter(h=>Date.parse(h.at)>=cut);

  activeDay=todayWeekday();
  save(); render();
}
async function save(){try{await window.storage.set(KEY,JSON.stringify(state),true);}catch(e){console.warn("storage off, memory only",e);}}

function items(day){return state.days[day]||(state.days[day]=[]);}

function addItem(){
  const n=document.getElementById("addName"),t=document.getElementById("addTgt");
  const name=n.value.trim(); if(!name) return;
  items(activeDay).push({id:activeDay+"-u-"+rnd(),name,target:parseInt(t.value)||0,count:0,
    done:false,addedBy:user.name,doneBy:null,carriedDays:0,flag:false,recurring:false});
  n.value="";t.value="";n.focus();save();render();
}
function delItem(day,id){state.days[day]=items(day).filter(x=>x.id!==id);save();render();}
function toggleDone(day,id){
  const it=items(day).find(x=>x.id===id); if(!it)return;
  it.done=!it.done;
  if(it.done){it.doneBy=user.name; if(it.target>0&&!it.count)it.count=it.target;}
  else it.doneBy=null;
  save();render();
}
function setCount(day,id,v){const it=items(day).find(x=>x.id===id);if(it){it.count=Math.max(0,parseInt(v)||0);save();}}
function toggleFlag(day,id){const it=items(day).find(x=>x.id===id);if(it){it.flag=!it.flag;save();render();}}

// Close-out: archive completed -> duty log; carry incomplete ONE-OFFS forward
// (recurring standing items regenerate next occurrence, so they don't pile up)
function closeOut(day,silent){
  const list=items(day);
  const tgt=NEXT[day];
  list.forEach(x=>{
    if(x.done){
      state.history.unshift({name:x.name,day,count:x.count,target:x.target,doneBy:x.doneBy||"—",at:new Date().toISOString()});
    }else if(!x.recurring){
      items(tgt).unshift(Object.assign({},x,{id:tgt+"-c-"+rnd(),carriedDays:(x.carriedDays||0)+1,done:false,doneBy:null,count:0}));
    }
  });
  state.days[day]=seedDay(day); // standing list ready for its next service
  if(!silent){
    const carried=list.filter(x=>!x.done&&!x.recurring).length;
    flashMsg=FULL[day]+" closed out. "+(carried?carried+" one-off"+(carried>1?"s":"")+" carried to "+FULL[tgt]+".":"No open one-offs to carry.");
    activeDay=tgt;
  }
  save();
}

function render(){
  const sel=document.getElementById("userSel");
  if(!sel.dataset.built){
    sel.innerHTML='<optgroup label="Staff">'+STAFF.map(s=>`<option value="staff:${s}">${s} · staff</option>`).join("")+
      `</optgroup><optgroup label="Owner"><option value="owner:${OWNER}">${OWNER} · owner</option></optgroup>`;
    sel.dataset.built="1";
    sel.onchange=()=>{const[r,n]=sel.value.split(":");user={role:r,name:n};render();};
  }
  sel.value=user.role+":"+user.name;
  document.getElementById("ctx").innerHTML = user.role==="owner"
    ? `<b>Owner view — ${user.name}.</b> Live prep status across the week. Tap any item to complete it yourself; the duty log shows who did what.`
    : `<b>Staff view — ${user.name}.</b> Your prep checklist for this shift. Check items as you go, and review the list any time before you clock out.`;

  const days=document.getElementById("days");days.innerHTML="";
  const tw=todayWeekday();
  DAYS.forEach(d=>{
    const list=items(d),done=list.filter(x=>x.done).length;
    const carry=list.some(x=>x.carriedDays>0&&!x.done);
    const el=document.createElement("div");
    el.className="day"+(d===activeDay?" active":"")+(d===tw?" today":"");
    el.innerHTML=`${d}<span class="cnt">${done}/${list.length}</span>`+(carry?'<span class="warn"></span>':'');
    el.onclick=()=>{activeDay=d;flashMsg="";render();};
    days.appendChild(el);
  });

  const list=items(activeDay);
  const done=list.filter(x=>x.done).length,open=list.length-done;
  const carry=list.filter(x=>x.carriedDays>0&&!x.done).length;
  const pct=list.length?Math.round(done/list.length*100):0;
  document.getElementById("gaugePct").textContent=pct+"%";
  document.getElementById("sDone").textContent=done;
  document.getElementById("sOpen").textContent=open;
  document.getElementById("sCarry").textContent=carry;
  document.getElementById("sTotal").textContent=list.length;
  drawGauge(pct);

  const urg=[];DAYS.forEach(d=>items(d).forEach(x=>{if(x.flag)urg.push({d,name:x.name});}));
  const ub=document.getElementById("urgent"),ul=document.getElementById("urgentList");
  if(urg.length){ub.style.display="block";ul.innerHTML=urg.map(u=>`<li>${esc(u.name)} <span style="color:var(--muted)">(${u.d})</span></li>`).join("");}
  else ub.style.display="none";

  document.getElementById("dayTitle").textContent=FULL[activeDay]+" prep";
  document.getElementById("daySub").textContent=list.length?`${done} of ${list.length} ready`:"";

  const wrap=document.getElementById("list");wrap.innerHTML="";
  if(!list.length) wrap.innerHTML='<div class="empty">Nothing on the list for '+FULL[activeDay]+'. Add a one-off below.</div>';
  list.forEach(it=>{
    const row=document.createElement("div");
    row.className="row"+(it.done?" done":"")+((it.carriedDays>0&&!it.done)?" carried":"");
    const meta=[];
    meta.push(it.recurring?`<span class="badge tag">daily</span>`:`<span class="badge tag one">one-off</span>`);
    if(it.carriedDays>0&&!it.done) meta.push(`<span class="badge carry">↻ carried ${it.carriedDays}d</span>`);
    if(it.done&&it.doneBy) meta.push(`<span class="badge who">✓ ${esc(it.doneBy)}</span>`);
    else if(it.addedBy&&it.addedBy!=="Standing list") meta.push(`<span class="badge who">+ ${esc(it.addedBy)}</span>`);
    row.innerHTML=`
      <button class="check" aria-label="Mark done"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7l3.5 3.5L12 3" fill="none" stroke="#0c2c1c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="rowmain"><div class="rowname">${esc(it.name)}</div><div class="rowmeta">${meta.join("")}</div></div>
      <div class="count">${it.target>0?`<input type="number" min="0" value="${it.count}" aria-label="count"/><span class="tgt">/ ${it.target}</span>`:""}</div>
      <button class="iconbtn flag${it.flag?" on":""}" title="Flag 911 restock">&#9873;</button>
      <button class="iconbtn del" title="Delete">&#128465;</button>`;
    row.querySelector(".check").onclick=()=>toggleDone(activeDay,it.id);
    row.querySelector(".del").onclick=()=>delItem(activeDay,it.id);
    row.querySelector(".flag").onclick=()=>toggleFlag(activeDay,it.id);
    const ci=row.querySelector(".count input"); if(ci) ci.onchange=()=>setCount(activeDay,it.id,ci.value);
    wrap.appendChild(row);
  });

  document.getElementById("closeNote").textContent=flashMsg||`At close-out: open one-offs carry to ${FULL[NEXT[activeDay]]}; standing list resets; completed go to the duty log.`;

  const counts={};STAFF.concat([OWNER]).forEach(p=>counts[p]=0);
  DAYS.forEach(d=>items(d).forEach(x=>{if(x.done&&counts[x.doneBy]!=null)counts[x.doneBy]++;}));
  state.history.forEach(h=>{if(counts[h.doneBy]!=null)counts[h.doneBy]++;});
  document.getElementById("crew").innerHTML=Object.keys(counts).map(p=>`<div class="crew">${p} <b>${counts[p]}</b></div>`).join("");

  const lb=document.getElementById("logBody");
  if(!state.history.length){lb.innerHTML='<div class="logempty">No completed items logged in the last 7 days.</div>';}
  else{
    lb.innerHTML=state.history.slice(0,60).map(h=>{
      const dt=new Date(h.at);
      const when=dt.toLocaleDateString(undefined,{weekday:"short"})+" "+dt.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
      const ct=h.target>0?`<span class="ct">${h.count}/${h.target}</span>`:"";
      return `<div class="logrow"><span class="t">${when}</span><span class="nm">${esc(h.name)} ${ct}</span><span class="by">${esc(h.doneBy)}</span></div>`;
    }).join("");
  }
}

function drawGauge(pct){
  const cx=84,cy=96,r=70,end=Math.PI*(1-pct/100);
  const x2=cx+r*Math.cos(end),y2=cy-r*Math.sin(end),large=pct>50?1:0;
  const fill=document.getElementById("gaugeFill");
  fill.setAttribute("d",pct<=0?"":`M ${cx-r} ${cy} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`);
  fill.setAttribute("stroke",pct>=80?"var(--green)":pct>=40?"var(--amber)":"var(--red)");
  const ang=Math.PI*(1-pct/100),nx=cx+(r-8)*Math.cos(ang),ny=cy-(r-8)*Math.sin(ang);
  const n=document.getElementById("needle");n.setAttribute("x2",nx);n.setAttribute("y2",ny);
}
function esc(s){return(s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

document.getElementById("addBtn").onclick=addItem;
document.getElementById("addName").addEventListener("keydown",e=>{if(e.key==="Enter")addItem();});
document.getElementById("closeBtn").onclick=()=>{closeOut(activeDay,false);render();};

load();
</script>
