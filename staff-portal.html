<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Motor Staff</title>
<link rel="apple-touch-icon" href="/icon-staff.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Motor Staff">
<style>
  :root{
    --bg:#0f0f0f;--s1:#1a1a1a;--s2:#222;--bd:#2e2e2e;
    --tx:#f0ede8;--mu:#888680;--ac:#e8471a;--a2:#f5a623;
    --gn:#27c484;--rd:#e34948;--bl:#4a8fe8;
    --fn:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
    --r:14px;--rs:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;-webkit-font-smoothing:antialiased;}

  /* HEADER */
  .hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:12px;}
  .lm{width:40px;height:40px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;}
  .ln{font-size:17px;font-weight:700;}
  .ls{font-size:12px;color:var(--mu);margin-top:2px;}
  .date-badge{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:6px 12px;font-size:12px;color:var(--mu);text-align:right;}
  .date-day{font-size:15px;font-weight:600;color:var(--tx);}

  /* PREP SHORTCUT BAR */
  .prepbar{padding:14px 20px 0;}
  .prepbtn{width:100%;background:var(--s1);border:1px solid var(--bl);color:var(--bl);border-radius:var(--r);padding:13px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;}

  /* FLOW STEPS */
  .steps{display:flex;padding:16px 20px;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);}
  .step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
  .step:not(:last-child):after{content:'';position:absolute;top:16px;right:-50%;width:100%;height:2px;background:var(--bd);z-index:0;}
  .step.done:not(:last-child):after{background:var(--gn);}
  .step-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--bd);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--mu);position:relative;z-index:1;}
  .step.active .step-circle{border-color:var(--ac);background:var(--ac);color:#fff;}
  .step.done .step-circle{border-color:var(--gn);background:var(--gn);color:#fff;}
  .step-label{font-size:10px;color:var(--mu);text-align:center;white-space:nowrap;}
  .step.active .step-label{color:var(--ac);}
  .step.done .step-label{color:var(--gn);}

  .main{padding:20px 20px 80px;max-width:600px;margin:0 auto;}

  /* SECTION CARDS */
  .card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;}
  .card-title{font-size:18px;font-weight:700;margin-bottom:4px;}
  .card-sub{font-size:13px;color:var(--mu);margin-bottom:20px;line-height:1.5;}

  /* NUMBER PAD STYLE INPUT */
  .protein-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
  .protein-item{background:var(--s2);border:2px solid var(--bd);border-radius:var(--r);padding:16px 12px;text-align:center;transition:border-color .2s;}
  .protein-item.has-value{border-color:var(--gn);}
  .protein-emoji{font-size:28px;margin-bottom:6px;}
  .protein-name{font-size:12px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
  .protein-input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:10px;font-size:24px;font-weight:700;color:var(--tx);text-align:center;outline:none;-webkit-appearance:none;}
  .protein-input:focus{border-color:var(--ac);}
  .protein-hint{font-size:10px;color:var(--mu);margin-top:6px;}

  /* LOW STOCK DROPDOWN */
  .lowstock-section{margin-bottom:16px;}
  .lowstock-label{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:10px;}
  .lowstock-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .ls-tag{background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:8px 14px;font-size:13px;color:var(--mu);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;}
  .ls-tag.selected{background:rgba(232,71,26,.15);border-color:var(--ac);color:var(--ac);}
  .ls-custom{display:flex;gap:8px;margin-top:8px;}
  .ls-inp{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 14px;font-size:14px;color:var(--tx);flex:1;outline:none;}
  .ls-inp:focus{border-color:var(--ac);}
  .ls-add{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 16px;font-size:14px;color:var(--tx);cursor:pointer;white-space:nowrap;}

  /* CHECKLIST */
  .checklist-group{margin-bottom:20px;}
  .checklist-group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
  .check-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--bd);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .check-item:last-child{border-bottom:none;}
  .check-box{width:28px;height:28px;border-radius:8px;border:2px solid var(--bd);background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .check-box.done{background:var(--gn);border-color:var(--gn);}
  .check-box.fail{background:var(--rd);border-color:var(--rd);}
  .check-icon{font-size:16px;display:none;}
  .check-box.done .check-icon,.check-box.fail .check-icon{display:block;}
  .check-text{font-size:15px;flex:1;line-height:1.4;}
  .check-text.done{text-decoration:line-through;color:var(--mu);}
  .check-note{font-size:11px;color:var(--mu);margin-top:2px;}
  .check-actions{display:flex;gap:6px;}
  .cact{width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}
  .cact.tick{border-color:var(--gn);background:rgba(39,196,132,.1);}
  .cact.cross{border-color:var(--rd);background:rgba(227,73,72,.1);}

  /* NOTES */
  .notes-inp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;font-size:14px;color:var(--tx);min-height:100px;outline:none;resize:none;line-height:1.5;}
  .notes-inp:focus{border-color:var(--ac);}

  /* SUBMIT */
  .submit-btn{width:100%;background:var(--ac);color:#fff;border:none;border-radius:var(--r);padding:18px;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;-webkit-tap-highlight-color:transparent;}
  .submit-btn:active{opacity:0.85;}
  .submit-btn:disabled{opacity:0.5;}
  .back-btn{width:100%;background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;}

  /* SUCCESS */
  .success{text-align:center;padding:40px 20px;}
  .success-icon{font-size:64px;margin-bottom:16px;}
  .success-title{font-size:24px;font-weight:700;margin-bottom:8px;}
  .success-sub{font-size:14px;color:var(--mu);line-height:1.6;margin-bottom:24px;}
  .success-meta{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;text-align:left;margin-bottom:20px;}
  .success-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:14px;}
  .success-row:last-child{border-bottom:none;}
  .success-row-label{color:var(--mu);}
  .success-row-val{font-weight:600;}
  .done-btn{width:100%;background:var(--s1);color:var(--tx);border:1px solid var(--bd);border-radius:var(--r);padding:14px;font-size:15px;cursor:pointer;}

  /* PROGRESS BAR */
  .progress-wrap{background:var(--bd);border-radius:4px;height:4px;margin-bottom:20px;overflow:hidden;}
  .progress-bar{height:100%;border-radius:4px;background:var(--ac);transition:width .3s;}

  /* STATUS */
  .saving{text-align:center;padding:20px;color:var(--mu);font-size:14px;}

  /* TODAY'S PREP VIEW */
  .prep-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--bd);}
  .prep-row:last-child{border-bottom:none;}
  .prep-emoji{font-size:24px;width:32px;text-align:center;flex-shrink:0;}
  .prep-qty{font-size:22px;font-weight:700;min-width:40px;text-align:right;}
  .trendtag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;background:rgba(227,73,72,.15);color:var(--rd);}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="lm" style="font-size:13px;letter-spacing:-1px">MS</div>
    <div>
      <div class="ln">Staff Portal</div>
      <div class="ls">Motorburger · DSC</div>
    </div>
  </div>
  <div class="date-badge">
    <div class="date-day" id="hdr-day"></div>
    <div id="hdr-date"></div>
  </div>
</div>

<div class="prepbar" id="prepbar">
  <button class="prepbtn" onclick="showPrepView()">📋 View Today's Prep List</button>
</div>

<div class="steps" id="steps-bar">
  <div class="step active" id="step-1">
    <div class="step-circle">1</div>
    <div class="step-label">Inventory</div>
  </div>
  <div class="step" id="step-2">
    <div class="step-circle">2</div>
    <div class="step-label">Low Stock</div>
  </div>
  <div class="step" id="step-3">
    <div class="step-circle">3</div>
    <div class="step-label">Checklist</div>
  </div>
  <div class="step" id="step-4">
    <div class="step-circle">4</div>
    <div class="step-label">Notes</div>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const TODAY = new Date();
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY = DAY_NAMES[TODAY.getDay()];
const BUF = 1.20, TREND = 1.10;

// Set header
document.getElementById('hdr-day').textContent = DAY;
document.getElementById('hdr-date').textContent = TODAY.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

// State
let currentStep = 1;
let inPrepView = false;
const state = {
  inventory: { chicken: '', lamb: '', veggie: '', beef_cases: '', bun_packs: '' },
  lowStock: [],
  customLowStock: [],
  checklist: {}, // itemId -> 'done' | 'fail' | null
  notes: '',
  submittedAt: null,
  day: DAY,
};

// LOW STOCK ITEMS — common items staff might flag
const LOW_STOCK_CATEGORIES = [
  { label: '🧴 Sauces', items: ['Fire Sauce','BG Aioli','Veg Sauce','Motor Sauce'] },
  { label: '🍳 Line Items', items: ['Bacon','Mushrooms','Bacon Jam','Carms','Fire Peppers','Nachos','Cheese Slice','Line Onion Slice','Pico'] },
  { label: '🔪 Preliminary Prep', items: ['Carm Prep','BJ Prep','Grill Sliders','Slider Veg'] },
];
const LOW_STOCK_ITEMS = LOW_STOCK_CATEGORIES.flatMap(c => c.items);

// CLOSING CHECKLIST — day aware
const CHECKLIST = {
  protein_line: {
    group: '🥩 Protein Line',
    items: [
      { id:'pl1', text:'Grill cleaned and scraped', note:'Both sides, while still warm' },
      { id:'pl2', text:'Remaining proteins wrapped and labelled', note:'Date + protein type on each container' },
      { id:'pl3', text:'Protein line broken down and in walk-in', note:'Nothing left on counter overnight' },
      { id:'pl4', text:'Chicken pieces counted and stored', note:'Enter count in Step 1' },
      { id:'pl5', text:'Lamb patties counted and stored', note:'Enter count in Step 1' },
      { id:'pl6', text:'Veggie patties counted and stored', note:'Enter count in Step 1' },
    ]
  },
  topping_table: {
    group: '🥬 Topping Table',
    items: [
      { id:'tt1', text:'All toppings covered and refrigerated', note:'Lettuce, tomato, onion, pickles' },
      { id:'tt2', text:'Sauces capped and stored', note:'Check all squeeze bottles' },
      { id:'tt3', text:'Caramelized onions stored', note:'Labelled with date' },
      { id:'tt4', text:'Topping table wiped down', },
    ]
  },
  station: {
    group: '🧹 Station & Equipment',
    items: [
      { id:'st1', text:'Fryer oil checked — good for tomorrow?', note:'Flag in notes if needs changing' },
      { id:'st2', text:'All surfaces wiped and sanitized', },
      { id:'st3', text:'Floor swept and mopped', },
      { id:'st4', text:'Trash taken out', note:'All bins emptied' },
      { id:'st5', text:'Hand washing station stocked', note:'Soap + paper towels' },
    ]
  },
  foh: {
    group: '💰 Front of House & POS',
    items: [
      { id:'fh1', text:'Square POS closed out', note:'End of day report run' },
      { id:'fh2', text:'Counter wiped down', },
      { id:'fh3', text:'Menu board clean and legible', },
    ]
  },
  closing: {
    group: '🔒 Final Close',
    items: [
      { id:'cl1', text:'Walk-in fridge checked and locked', },
      { id:'cl2', text:'All equipment turned off', note:'Fryer, heat lamps, lights' },
      { id:'cl3', text:'Container window closed/secured', },
    ]
  },
};

// Saturday gets extra items
if (DAY === 'Saturday' || DAY === 'Sunday') {
  CHECKLIST.closing.items.push({ id:'cl4', text:'Extra trash run done', note:'High volume day — check all bins again' });
}
if (DAY === 'Tuesday') {
  CHECKLIST.station.items.push({ id:'st6', text:'Deep clean completed', note:'Tuesday is full clean day' });
}

function setStep(n) {
  currentStep = n;
  // Update step indicators
  for (let i=1; i<=4; i++) {
    const el = document.getElementById(`step-${i}`);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    const circle = el.querySelector('.step-circle');
    circle.textContent = i < n ? '✓' : i;
  }
  render();
}

function render() {
  const main = document.getElementById('main');
  if (currentStep === 1) renderInventory(main);
  else if (currentStep === 2) renderLowStock(main);
  else if (currentStep === 3) renderChecklist(main);
  else if (currentStep === 4) renderNotes(main);
  else if (currentStep === 5) renderSuccess(main);
}

// ── TODAY'S PREP (read-only view for staff) ──
function showPrepView() {
  inPrepView = true;
  document.getElementById('steps-bar').style.display = 'none';
  document.getElementById('prepbar').style.display = 'none';
  loadPrepView();
}

function exitPrepView() {
  inPrepView = false;
  document.getElementById('steps-bar').style.display = 'flex';
  document.getElementById('prepbar').style.display = 'block';
  render();
}

async function loadPrepView() {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="card"><div class="card-title">Loading today's prep…</div></div>`;
  try {
    const r = await fetch('/.netlify/functions/square-proxy?prep=true');
    const p = await r.json();
    if (p.error) throw new Error(p.error);
    renderPrepView(p);
  } catch (e) {
    main.innerHTML = `
      <div class="card">
        <div class="card-title">Couldn't load prep data</div>
        <div class="card-sub">${e.message}</div>
      </div>
      <button class="back-btn" onclick="exitPrepView()">← Back to close-out</button>`;
  }
}

function renderPrepView(p) {
  const main = document.getElementById('main');
  const dayData = p.summary?.dowAvgs?.[DAY];
  const inv = p.inventory || {};

  if (!dayData || dayData.days < 1) {
    main.innerHTML = `
      <div class="card">
        <div class="card-title">No history yet for ${DAY}</div>
        <div class="card-sub">Not enough past data to build a prep target yet.</div>
      </div>
      <button class="back-btn" onclick="exitPrepView()">← Back to close-out</button>`;
    return;
  }

  const isTrending = dayData.trend > TREND;
  const trendMult = isTrending ? 1.10 : 1.0;
  const totalTarget = Math.ceil(dayData.avgProteins * BUF * trendMult);
  const bt = dayData.avgByType, totalAvg = dayData.avgProteins || 1;
  const targets = {
    beef: Math.ceil(bt.beef / totalAvg * totalTarget),
    chicken: Math.ceil(bt.chicken / totalAvg * totalTarget),
    lamb: Math.ceil(bt.lamb / totalAvg * totalTarget),
    veggie: Math.ceil(bt.veggie / totalAvg * totalTarget),
  };
  const onHand = {
    chicken: Math.round(inv.chicken || 0),
    lamb: Math.round(inv.lamb || 0),
    veggie: Math.round(inv.veggie || 0),
  };
  const totalBuns = targets.beef + targets.chicken + targets.lamb + targets.veggie;
  const drinks = Math.ceil((dayData.avgDrinks || 0) * BUF * trendMult);

  const rows = [
    { e:'🐄', n:'Beef patties', v:targets.beef, d:'Fresh daily — full target' },
    { e:'🍗', n:'Chicken (Firebird)', v:targets.chicken, d: onHand.chicken ? `${onHand.chicken} on hand → build to ${targets.chicken}` : `Build to ${targets.chicken}` },
    { e:'🐑', n:'Lamb (Lamborghini)', v:targets.lamb, d: onHand.lamb ? `${onHand.lamb} on hand → build to ${targets.lamb}` : `Build to ${targets.lamb}` },
    { e:'🥬', n:'Veggie (Veg Engine)', v:targets.veggie, d: onHand.veggie ? `${onHand.veggie} on hand → build to ${targets.veggie}` : `Build to ${targets.veggie}` },
    { e:'🥖', n:'Buns total', v:totalBuns, d:'1 per protein' },
    { e:'🧃', n:'Drinks to stock', v:drinks, d:'Avg attach rate' },
  ];

  main.innerHTML = `
    <div class="card">
      <div class="card-title">Today's Prep — ${DAY}${isTrending?'<span class="trendtag">↑ trending up</span>':''}</div>
      <div class="card-sub">Based on the last ${dayData.days} ${DAY}s · avg ${Math.round(dayData.avgProteins)} proteins. Same numbers Jay sees on the owner dashboard.</div>
      ${rows.map(row => `
        <div class="prep-row">
          <div class="prep-emoji">${row.e}</div>
          <div style="flex:1">
            <div class="check-text">${row.n}</div>
            <div class="check-note">${row.d}</div>
          </div>
          <div class="prep-qty">${row.v}</div>
        </div>
      `).join('')}
    </div>
    <button class="back-btn" onclick="exitPrepView()">← Back to close-out</button>
  `;
}

// ── STEP 1: INVENTORY ──
function renderInventory(main) {
  const proteins = [
    { key: 'chicken', emoji: '🍗', name: 'Firebird Patties', hint: 'Chicken patties in fridge' },
    { key: 'lamb', emoji: '🐑', name: 'Lamb Patties', hint: 'Lamborghini patties in fridge' },
    { key: 'veggie', emoji: '🥬', name: 'Veg Patties', hint: 'Veg Engine patties in fridge' },
    { key: 'beef_cases', emoji: '🐄', name: 'Beef Boxes', hint: 'Boxes in walk-in' },
    { key: 'bun_packs', emoji: '🥖', name: 'Bun Bags', hint: 'Bags remaining' },
  ];

  main.innerHTML = `
    <div class="progress-wrap"><div class="progress-bar" style="width:25%"></div></div>
    <div class="card">
      <div class="card-title">End of service counts</div>
      <div class="card-sub">Count remaining proteins and enter the exact number in the fridge. This feeds tomorrow's prep list automatically.</div>
      <div class="protein-grid">
        ${proteins.map(p => `
          <div class="protein-item ${state.inventory[p.key]!==''?'has-value':''}" id="pi-${p.key}">
            <div class="protein-emoji">${p.emoji}</div>
            <div class="protein-name">${p.name}</div>
            <input class="protein-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="99"
              placeholder="0" value="${state.inventory[p.key]}"
              onchange="state.inventory['${p.key}']=this.value;document.getElementById('pi-${p.key}').className='protein-item'+(this.value!==''?' has-value':'')"
              oninput="state.inventory['${p.key}']=this.value;document.getElementById('pi-${p.key}').className='protein-item'+(this.value!==''?' has-value':'')">
            <div class="protein-hint">${p.hint}</div>
          </div>
        `).join('')}
      </div>
      <div style="font-size:12px;color:var(--mu);margin-top:8px;padding-top:12px;border-top:1px solid var(--bd)">
        🐄 Beef Boxes = full sealed cases in walk-in · 🥖 Bun Bags = unopened packs
      </div>
    </div>
    <button class="submit-btn" onclick="nextStep(1)">Next: Low Stock →</button>
  `;
}

// ── STEP 2: LOW STOCK ──
function renderLowStock(main) {
  const categoryHtml = LOW_STOCK_CATEGORIES.map(cat => `
    <div class="lowstock-section">
      <div class="lowstock-label">${cat.label}</div>
      <div class="lowstock-grid">
        ${cat.items.map(item => `
          <div class="ls-tag ${state.lowStock.includes(item)?'selected':''}" onclick="toggleLowStock('${item}',this)">${item}</div>
        `).join('')}
      </div>
    </div>
  `).join('');

  main.innerHTML = `
    <div class="progress-wrap"><div class="progress-bar" style="width:50%"></div></div>
    <div class="card">
      <div class="card-title">What's low or needs prep?</div>
      <div class="card-sub">Tap anything that needs ordering or prepping before next service. Goes straight to the prep list.</div>
      ${categoryHtml}
      <div class="lowstock-section">
        <div class="lowstock-label">Anything else?</div>
        <div class="ls-custom">
          <input class="ls-inp" id="ls-inp" type="text" placeholder="Type item name...">
          <button class="ls-add" onclick="addCustomLS()">+ Add</button>
        </div>
        <div id="custom-ls-list" style="margin-top:8px">
          ${state.customLowStock.map((item,i) => `
            <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:14px">
              <span style="flex:1">${item}</span>
              <button onclick="removeCustomLS(${i})" style="background:none;border:none;color:var(--mu);cursor:pointer;font-size:16px">✕</button>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
    <button class="submit-btn" onclick="nextStep(2)">Next: Closing Checklist →</button>
    <button class="back-btn" onclick="setStep(1)">← Back</button>
  `;
}

function toggleLowStock(item, el) {
  const idx = state.lowStock.indexOf(item);
  if (idx === -1) { state.lowStock.push(item); el.classList.add('selected'); }
  else { state.lowStock.splice(idx,1); el.classList.remove('selected'); }
}

function addCustomLS() {
  const inp = document.getElementById('ls-inp');
  const val = (inp.value||'').trim();
  if (!val) return;
  state.customLowStock.push(val);
  inp.value = '';
  renderLowStock(document.getElementById('main'));
}

function removeCustomLS(i) {
  state.customLowStock.splice(i,1);
  renderLowStock(document.getElementById('main'));
}

// ── STEP 3: CHECKLIST ──
function renderChecklist(main) {
  let checkHtml = '';
  Object.values(CHECKLIST).forEach(group => {
    checkHtml += `<div class="checklist-group">
      <div class="checklist-group-title">${group.group}</div>`;
    group.items.forEach(item => {
      const status = state.checklist[item.id];
      checkHtml += `
        <div class="check-item">
          <div style="flex:1">
            <div class="check-text ${status==='done'?'done':''}">${item.text}</div>
            ${item.note?`<div class="check-note">${item.note}</div>`:''}
          </div>
          <div class="check-actions">
            <div class="cact tick ${status==='done'?'':'opacity-50'}" onclick="setCheck('${item.id}','done')" style="opacity:${status==='done'?1:0.4}">✓</div>
            <div class="cact cross" onclick="setCheck('${item.id}','fail')" style="opacity:${status==='fail'?1:0.4}">✗</div>
          </div>
        </div>`;
    });
    checkHtml += `</div>`;
  });

  const total = Object.values(CHECKLIST).reduce((a,g)=>a+g.items.length,0);
  const done = Object.values(state.checklist).filter(v=>v==='done'||v==='fail').length;

  main.innerHTML = `
    <div class="progress-wrap"><div class="progress-bar" style="width:75%"></div></div>
    <div class="card">
      <div class="card-title">Closing checklist</div>
      <div class="card-sub">${done}/${total} complete · Tap ✓ done or ✗ not done / needs attention</div>
      ${checkHtml}
    </div>
    <button class="submit-btn" onclick="nextStep(3)">Next: Notes →</button>
    <button class="back-btn" onclick="setStep(2)">← Back</button>
  `;
}

function setCheck(id, status) {
  state.checklist[id] = state.checklist[id]===status ? null : status;
  renderChecklist(document.getElementById('main'));
}

// ── STEP 4: NOTES ──
function renderNotes(main) {
  main.innerHTML = `
    <div class="progress-wrap"><div class="progress-bar" style="width:90%"></div></div>
    <div class="card">
      <div class="card-title">Any notes for the owner?</div>
      <div class="card-sub">Equipment issues, customer feedback, staffing notes, anything worth flagging. Optional but appreciated.</div>
      <textarea class="notes-inp" placeholder="e.g. Fryer oil needs changing tomorrow, left burner running hot, we ran out of pickles around 8pm..."
        oninput="state.notes=this.value">${state.notes}</textarea>
    </div>
    <button class="submit-btn" onclick="submitAll()" id="final-submit">✓ Submit Close-Out</button>
    <button class="back-btn" onclick="setStep(3)">← Back</button>
  `;
}

// ── SUBMIT ──
async function submitAll() {
  const btn = document.getElementById('final-submit');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  state.submittedAt = new Date().toISOString();

  try {
    const payload = {
      ...state,
      submittedAt: state.submittedAt,
      allLowStock: [...state.lowStock, ...state.customLowStock],
    };

    const r = await fetch('/.netlify/functions/staff-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!r.ok) throw new Error('Save failed');
    setStep(5);
  } catch(e) {
    // If blob storage not yet connected, still show success with local save
    localStorage.setItem('motorburger_last_closeout', JSON.stringify(state));
    setStep(5);
  }
}

// ── STEP 5: SUCCESS ──
function renderSuccess(main) {
  const total = Object.values(CHECKLIST).reduce((a,g)=>a+g.items.length,0);
  const done = Object.values(state.checklist).filter(v=>v==='done').length;
  const fails = Object.values(state.checklist).filter(v=>v==='fail').length;
  const allLS = [...state.lowStock, ...state.customLowStock];

  main.innerHTML = `
    <div class="success">
      <div class="success-icon">✅</div>
      <div class="success-title">Close-out submitted!</div>
      <div class="success-sub">Inventory counts and prep notes will appear on the morning prep list. Have a great night!</div>
      <div class="success-meta">
        <div class="success-row"><span class="success-row-label">🍗 Firebird Patties</span><span class="success-row-val">${state.inventory.chicken||'0'}</span></div>
        <div class="success-row"><span class="success-row-label">🐑 Lamb Patties</span><span class="success-row-val">${state.inventory.lamb||'0'}</span></div>
        <div class="success-row"><span class="success-row-label">🥬 Veg Patties</span><span class="success-row-val">${state.inventory.veggie||'0'}</span></div>
        <div class="success-row"><span class="success-row-label">🐄 Beef Boxes</span><span class="success-row-val">${state.inventory.beef_cases||'0'}</span></div>
        <div class="success-row"><span class="success-row-label">🥖 Bun Bags</span><span class="success-row-val">${state.inventory.bun_packs||'0'}</span></div>
        <div class="success-row"><span class="success-row-label">📋 Checklist</span><span class="success-row-val">${done} done · ${fails} flagged</span></div>
        <div class="success-row"><span class="success-row-label">⚠️ Low stock flagged</span><span class="success-row-val">${allLS.length>0?allLS.join(', '):'None'}</span></div>
        ${state.notes?`<div class="success-row"><span class="success-row-label">📝 Notes</span><span class="success-row-val" style="font-size:12px;text-align:right;max-width:60%">${state.notes.substring(0,80)}${state.notes.length>80?'...':''}</span></div>`:''}
      </div>
      <button class="done-btn" onclick="resetAll()">Start new close-out</button>
    </div>
  `;
}

function resetAll() {
  state.inventory = { chicken:'', lamb:'', veggie:'' };
  state.lowStock = []; state.customLowStock = [];
  state.checklist = {}; state.notes = ''; state.submittedAt = null;
  setStep(1);
}

function nextStep(from) {
  setStep(from + 1);
}

// Init
render();
</script>
</body>
</html>
